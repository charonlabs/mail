[pytest]
addopts = -ra -p no:cacheprovider
# Default collection is the active MAIL v2 suite.
# Run `uv run pytest src/mail/legacy/tests` for archived MAIL v1 tests.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
asyncio_mode = auto
