name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: unit + integration + contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run default suite with coverage
        # pytest.ini excludes the e2e marker by default; the coverage
        # ratchet (fail_under) is configured in pyproject.toml.
        run: uv run pytest --cov

  e2e:
    name: e2e journeys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run full-system journeys
        run: uv run pytest tests/e2e -m e2e
