          title: Swarm
        host:
          type: string
          title: Host
        owner:
          type: string
          title: Owner
        members:
          items:
            type: string
          type: array
          title: Members
        policy:
          $ref: '#/components/schemas/MAILListPolicy'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
        list_id:
          type: string
          title: List Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - name
      - swarm
      - host
      - owner
      - list_id
      - created_at
      - updated_at
      title: MAILListInBackend
      description: Backend storage variant — adds the assigned id and timestamps.
    MAILListPolicy:
      properties:
        visibility:
          type: string
          enum:
          - public
          - private
          title: Visibility
          default: public
        join_policy:
          type: string
          enum:
          - open
          - approval
          - admin-only
          title: Join Policy
          default: open
        send_policy:
          type: string
          enum:
          - open
          - members-only
          - admin-only
          title: Send Policy
          default: open
      type: object
      title: MAILListPolicy
      description: 'Policy controls for a MAIL list.


        All three fields are forward-looking — the wire format reserves the

        enumerations now so future contributions can extend ``join_policy``

        and ``send_policy`` without changing the protocol shape.


        For v1 contribution scope, only the ``public`` / ``open`` / ``open``

        variants are honored by the server. Other variants validate at the

        protocol layer but are rejected at the endpoint layer.'
    MAILMessage:
      properties:
        mail_version:
          type: string
          const: '2.0'
          title: Mail Version
        message_id:
          type: string
          title: Message Id
        reply_to:
          anyOf:
          - type: string
          - type: 'null'
          title: Reply To
        sender:
          type: string
          title: Sender
        recipients:
          items:
            type: string
          type: array
          title: Recipients
        subject:
          type: string
          title: Subject
        body:
          type: string
          title: Body
        tags:
          items:
            type: string
          type: array
          title: Tags
        sent_at:
          type: string
          format: date-time
          title: Sent At
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_version
      - message_id
      - sender
      - recipients
      - subject
      - body
      - tags
      - sent_at
      - metadata
      title: MAILMessage
      description: A constructed message to be delivered via MAIL.
    MAILMessageSummary:
      properties:
        message_id:
          type: string
          title: Message Id
        sender:
          type: string
          title: Sender
        recipients:
          items:
            type: string
          type: array
          title: Recipients
        subject:
          type: string
          title: Subject
        body_size:
