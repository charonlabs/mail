  /inbox:
    get:
      tags:
      - inbox
      summary: Get a list of inbox messages
      operationId: get_inbox_inbox_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          exclusiveMinimum: 0
          default: 20
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: sort_by
        in: query
        required: false
        schema:
          enum:
          - sent_at
          - entered_at
          type: string
          default: entered_at
          title: Sort By
      - name: order
        in: query
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
          default: desc
          title: Order
      responses:
        '200':
          description: Successful Response
          content:
