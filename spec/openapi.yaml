      - metadata
      title: DaemonDeliverLocalResponse
      description: 'Corresponds to `POST /daemon/deliver/local`.

        Contains the list of messages successfully delivered to server-local user-agents.'
    DaemonDeliverRemoteRequest:
      properties:
        messages:
          items:
