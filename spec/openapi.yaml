openapi: 3.1.0
info:
  title: MAIL
  summary: Multi-Agent Interface Layer
  description: An email system for humans and agents alike
  version: '2.0'
paths:
  /auth/token:
    post:
      tags:
      - authentication
      summary: Log in with an address and password to obtain an access token
      operationId: create_auth_token_auth_token_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_create_auth_token_auth_token_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPostResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/refresh:
    post:
      tags:
      - authentication
      summary: Exchange a refresh token for a new access token (rotates the refresh
        token)
      description: The refresh token is read from the httpOnly cookie when present
        (browsers); the request body is the fallback for clients that cannot use the
        cookie (e.g. the CLI). The body may be omitted entirely when the cookie carries
        the token.
      operationId: post_auth_refresh_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/AuthRefreshPostRequest'
              - type: 'null'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshPostResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/logout:
    post:
      tags:
      - authentication
      summary: Revoke the presented refresh token's family and clear the cookie
      description: The refresh token is read from the httpOnly cookie when present
        (browsers), falling back to the request body. The body may be omitted entirely;
        logout always succeeds and clears the cookie regardless.
      operationId: post_auth_logout_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/AuthRefreshPostRequest'
              - type: 'null'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutPostResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/whoami:
    get:
