      - subject
      - body_size
      - received_at
      - delivered_by
      title: MAILInboxEntrySummary
      description: A summarized MAIL inbox entry to be included in lists.
    MAILListInBackend:
      properties:
        list_type:
          type: string
          const: list
          title: List Type
          default: list
