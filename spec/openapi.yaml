      - host
      title: MAILDaemon
    MAILDraft:
      properties:
        draft_id:
          type: string
          title: Draft Id
        subject:
          type: string
          title: Subject
        body:
          type: string
          title: Body
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Updated At
        reply_to:
          anyOf:
          - type: string
          - type: 'null'
          title: Reply To
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
      type: object
      required:
