      - metadata
      title: DaemonMessageBufferClearResponse
      description: 'Corresponds to `POST /daemon/message-buffer/clear`.

        Contains the IDs of all MAIL messages on the server to be delivered by the
        daemon.'
    DraftDeleteResponse:
      properties:
        entry:
          $ref: '#/components/schemas/MAILDraftsEntry'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - entry
      - metadata
      title: DraftDeleteResponse
      description: 'Corresponds to `DELETE /drafts/{draft_id}`.

        Contains the specific message draft deleted from the user-agent''s drafts
        box.'
    DraftGetResponse:
      properties:
        entry:
          $ref: '#/components/schemas/MAILDraftsEntry'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - entry
      - metadata
      title: DraftGetResponse
      description: 'Corresponds to `GET /drafts/{draft_id}`.

        Contains a specific message draft inside the user-agent''s drafts box.'
    DraftPatchRequest:
      properties:
        subject:
          anyOf:
          - type: string
          - type: 'null'
          title: Subject
        body:
          anyOf:
          - type: string
          - type: 'null'
          title: Body
        reply_to:
          anyOf:
          - type: string
          - type: 'null'
          title: Reply To
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
      type: object
      title: DraftPatchRequest
      description: 'Corresponds to `PATCH /drafts/{draft_id}`.

        Contains the fields to update on an existing MAIL message draft.


        Every field is optional: a field left unset (``None``) is not modified,

        so callers can patch a single field without resending the rest. The one

        asymmetry is ``tags`` — sending ``tags: []`` clears all tags, while

        omitting ``tags`` leaves the existing tags untouched.'
    DraftPatchResponse:
      properties:
        entry:
          $ref: '#/components/schemas/MAILDraftsEntry'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - entry
      - metadata
      title: DraftPatchResponse
      description: 'Corresponds to `PATCH /drafts/{draft_id}`.

        Contains the updated message draft in the user-agent''s drafts box.'
    DraftPostRequest:
      properties:
        subject:
          type: string
          title: Subject
        body:
          type: string
          title: Body
        reply_to:
          anyOf:
          - type: string
          - type: 'null'
          title: Reply To
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
      type: object
      required:
      - subject
      - body
      title: DraftPostRequest
      description: 'Corresponds to `POST /drafts/`.

        Contains relevant information for creating a new MAIL message draft.


        `reply_to` optionally references the `message_id` of the message this

        draft is replying to. `tags` is an optional list of sender-defined slug

        strings used to categorize the eventual message.'
    DraftPostResponse:
      properties:
        entry:
          $ref: '#/components/schemas/MAILDraftsEntry'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - entry
      - metadata
      title: DraftPostResponse
      description: 'Corresponds to `POST /drafts`.

        Contains the new entry in the user-agent''s drafts box.'
    DraftSendPostRequest:
      properties:
        recipients:
          items:
            type: string
          type: array
          title: Recipients
        tags:
          items:
            type: string
          type: array
          title: Tags
          default: []
      type: object
      required:
      - recipients
      title: DraftSendPostRequest
      description: 'Corresponds to `POST /drafts/{draft_id}/send`.

        Contains relevant information for sending an existing draft as a MAIL message.


        `tags` is an optional list of sender-defined slug strings; any tags

        supplied here are merged (union, order-preserving) with the tags already

        stored on the draft.'
    DraftSendPostResponse:
      properties:
        message:
          $ref: '#/components/schemas/MAILMessage'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - message
      - metadata
      title: DraftSendPostResponse
      description: 'Corresponds to `POST /drafts/{draft_id}/send`.

        Contains the assembled MAIL message to be delivered.'
    DraftsGetResponse:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/MAILDraftsEntrySummary'
          type: array
          title: Entries
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - entries
      - metadata
      title: DraftsGetResponse
      description: 'Corresponds to `GET /drafts`.

        Contains a list of entries in the user-agent''s drafts box.'
