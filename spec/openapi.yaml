          - type: 'null'
          title: Sent At
        sent_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Sent By
      type: object
      required:
      - draft
      title: MAILDraftsEntry
      description: A MAIL message draft in a user-agent's drafts box.
    MAILDraftsEntrySummary:
      properties:
