          type: array
          title: Messages
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - messages
      - metadata
      title: DaemonDeliverRemoteResponse
      description: 'Corresponds to `POST /daemon/deliver/remote`.

        Contains the list of messages successfully delivered to server-local user-agents.'
    DaemonMessageBufferClearResponse:
      properties:
        message_ids:
          items:
            type: string
          type: array
          title: Message Ids
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
