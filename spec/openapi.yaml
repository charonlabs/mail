openapi: 3.1.0
info:
  title: MAIL
  summary: Multi-Agent Interface Layer
  description: An email system for humans and agents alike
  version: '2.0'
paths:
  /auth/token:
    post:
      tags:
      - authentication
      summary: Log in with an address and password to obtain an access token
      operationId: create_auth_token_auth_token_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_create_auth_token_auth_token_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPostResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/whoami:
    get:
      tags:
      - authentication
      summary: Get MAIL user-agent info
      operationId: get_token_info_auth_whoami_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthWhoamiGetResponse'
  /auth/password/reset:
    post:
      tags:
      - authentication
      summary: Reset the user-agent's password
      operationId: post_password_reset_auth_password_reset_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPasswordResetResponse'
  /swarms:
    get:
      tags:
      - swarms
      summary: Get basic server information and metadata
      operationId: get_swarms_swarms_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmsGetResponse'
  /swarms/{swarm_name}:
    get:
      tags:
      - swarms
      summary: Get information on a specific swarm by name
      operationId: get_swarm_swarms__swarm_name__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmGetResponse'
  /swarms/{swarm_name}/health:
    get:
      tags:
      - swarms
      summary: Get health information on a specific swarm by name
      operationId: get_swarm_health_swarms__swarm_name__health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmHealthGetResponse'
  /inbox:
    get:
      tags:
      - inbox
      summary: Get a list of inbox messages
      operationId: get_inbox_inbox_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxGetResponse'
  /inbox/{message_id}:
    get:
      tags:
      - inbox
      summary: Get a specific inbox message by ID
      operationId: open_inbox_message_inbox__message_id__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMessageGetResponse'
    delete:
      tags:
      - inbox
      summary: Move a specific inbox message by ID to trash
      operationId: delete_inbox_message_inbox__message_id__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMessageDeleteResponse'
  /outbox:
    get:
      tags:
      - outbox
      summary: Get a list of outbox messages
      operationId: get_outbox_outbox_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxGetResponse'
  /outbox/{message_id}:
    get:
      tags:
      - outbox
      summary: Get a specific outbox message by ID
      operationId: get_outbox_message_outbox__message_id__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxMessageGetResponse'
  /drafts:
    get:
      tags:
      - drafts
      summary: Get a list of message drafts
      operationId: get_drafts_drafts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftsGetResponse'
    post:
      tags:
      - drafts
      summary: Create a new message draft
      operationId: post_draft_drafts_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftPostResponse'
  /drafts/{draft_id}:
    get:
      tags:
      - drafts
      summary: Get a specific message draft by ID
      operationId: get_draft_drafts__draft_id__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftGetResponse'
    delete:
      tags:
      - drafts
      summary: Delete a specific message draft by ID
      operationId: delete_draft_drafts__draft_id__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftDeleteResponse'
  /drafts/{draft_id}/send:
    post:
      tags:
      - drafts
      summary: Send a message from an existing draft by ID
      operationId: post_draft_send_drafts__draft_id__send_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftSendPostResponse'
  /trash:
    get:
      tags:
      - trash
      summary: Get a list of messages in trash
      operationId: get_trashed_messages_trash_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrashGetResponse'
  /trash/{message_id}:
    get:
      tags:
      - trash
      summary: Get a specific trashed message by ID
      operationId: get_trashed_message_trash__message_id__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrashMessageGetResponse'
    delete:
      tags:
      - trash
      summary: Delete a specific trashed message by ID
      operationId: delete_trashed_message_trash__message_id__delete
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          title: Message Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrashMessageDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /trash/clear:
    post:
      tags:
      - trash
      summary: Remove all exisisting messages from trash
      operationId: post_trash_clear_trash_clear_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrashClearPostResponse'
  /daemon/message-buffer/clear:
    post:
      tags:
      - daemon
      summary: Obtain all messages in need of delivery
      operationId: clear_message_buffer_daemon_message_buffer_clear_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaemonMessageBufferClearResponse'
  /daemon/deliver/local:
    post:
      tags:
      - daemon
      summary: Upload new messages to deliver from local agent(s)
      operationId: deliver_local_messages_daemon_deliver_local_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaemonDeliverLocalResponse'
  /daemon/deliver/remote:
    post:
      tags:
      - daemon
      summary: Upload new messages to deliver from remote agent(s)
      operationId: deliver_remote_messages_daemon_deliver_remote_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaemonDeliverRemoteResponse'
  /admin/agents:
    get:
      tags:
      - admin
      summary: Get a list of agents registered on this server
      operationId: get_agents_admin_agents_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAgentsGetResponse'
    post:
      tags:
      - admin
      summary: Create a new MAIL agent on this server
      operationId: post_agent_admin_agents_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAgentPostResponse'
  /admin/agents/{agent_address}:
    get:
      tags:
      - admin
      summary: Get a specific registered agent by local address (name@swarm)
      operationId: get_agent_admin_agents__agent_address__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAgentGetResponse'
    delete:
      tags:
      - admin
      summary: Delete an existing MAIL agent on this server
      operationId: delete_agent_admin_agents__agent_address__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAgentDeleteResponse'
  /admin/daemons:
    get:
      tags:
      - admin
      summary: Get a list of daemons registered on this server
      operationId: get_daemons_admin_daemons_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDaemonsGetResponse'
    post:
      tags:
      - admin
      summary: Create a new MAIL daemon on this server
      operationId: post_daemon_admin_daemons_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDaemonPostResponse'
  /admin/daemons/{worker_name}:
    get:
      tags:
      - admin
      summary: Get a specific registered daemon by worker name
      operationId: get_daemon_admin_daemons__worker_name__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDaemonGetResponse'
    delete:
      tags:
      - admin
      summary: Delete an existing MAIL daemon on this server
      operationId: delete_daemon_admin_daemons__worker_name__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDaemonDeleteResponse'
  /admin/users:
    get:
      tags:
      - admin
      summary: Get a list of users registered on this server
      operationId: get_users_admin_users_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersGetResponse'
    post:
      tags:
      - admin
      summary: Create a new MAIL user on this server
      operationId: post_user_admin_users_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserPostResponse'
  /admin/users/{user_id}:
    get:
      tags:
      - admin
      summary: Get a specific registered user by ID
      operationId: get_user_admin_users__user_id__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserGetResponse'
    delete:
      tags:
      - admin
      summary: Delete an existing MAIL user on this server
      operationId: delete_user_admin_users__user_id__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDeleteResponse'
  /admin/swarms:
    post:
      tags:
      - admin
      summary: Create a new MAIL swarm on this server
      operationId: post_swarm_admin_swarms_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSwarmPostResponse'
  /admin/swarms/{swarm_name}:
    delete:
      tags:
      - admin
      summary: Delete an existing MAIL swarm on this server by name
      operationId: delete_swarm_admin_swarms__swarm_name__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSwarmDeleteResponse'
  /admin/webhooks:
    get:
      tags:
      - admin
      summary: Get the IDs of all existing server webhooks
      operationId: get_webhooks_admin_webhooks_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWebhooksGetResponse'
    post:
      tags:
      - admin
      summary: Create a new webhook for this server
      operationId: post_webhook_admin_webhooks_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWebhooksPostResponse'
  /admin/webhooks/{webhook_id}:
    get:
      tags:
      - admin
      summary: Get a specific existing server webhook by ID
      operationId: get_webhook_admin_webhooks__webhook_id__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWebhookGetResponse'
    delete:
      tags:
      - admin
      summary: Delete an existing webhook by ID from this server
      operationId: delete_webhook_admin_webhooks__webhook_id__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWebhooksDeleteResponse'
    patch:
      tags:
      - admin
      summary: Update an existing webhook by ID on this server
      operationId: patch_webhook_admin_webhooks__webhook_id__patch
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWebhooksPatchResponse'
  /admin/lists:
    get:
      tags:
      - admin-lists
      summary: Get all MAIL lists known to this server
      operationId: admin_get_lists_admin_lists_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListsGetResponse'
    post:
      tags:
      - admin-lists
      summary: Create a new MAIL list on this server
      operationId: admin_post_list_admin_lists_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListPostResponse'
  /admin/lists/{list_address}:
    get:
      tags:
      - admin-lists
      summary: Get a specific MAIL list by address
      operationId: admin_get_list_admin_lists__list_address__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListGetResponse'
    delete:
      tags:
      - admin-lists
      summary: Delete a MAIL list
      operationId: admin_delete_list_admin_lists__list_address__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListDeleteResponse'
    patch:
      tags:
      - admin-lists
      summary: Update a MAIL list's policy
      operationId: admin_patch_list_admin_lists__list_address__patch
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListPatchResponse'
  /admin/lists/{list_address}/members:
    post:
      tags:
      - admin-lists
      summary: Admin-add a member to a MAIL list
      operationId: admin_add_list_member_admin_lists__list_address__members_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemberPostResponse'
  /admin/lists/{list_address}/members/{member_address}:
    delete:
      tags:
      - admin-lists
      summary: Admin-remove a member from a MAIL list
      operationId: admin_remove_list_member_admin_lists__list_address__members__member_address__delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemberDeleteResponse'
  /lists:
    get:
      tags:
      - lists
      summary: Get lists visible to the caller
      operationId: get_lists_lists_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListsGetResponse'
  /lists/{list_address}:
    get:
      tags:
      - lists
      summary: Get a specific list
      operationId: get_list_lists__list_address__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGetResponse'
  /lists/{list_address}/subscribe:
    post:
      tags:
      - lists
      summary: Subscribe to a MAIL list
      operationId: subscribe_lists__list_address__subscribe_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemberPostResponse'
  /lists/{list_address}/unsubscribe:
    post:
      tags:
      - lists
      summary: Unsubscribe from a MAIL list
      operationId: unsubscribe_lists__list_address__unsubscribe_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemberDeleteResponse'
  /:
    get:
      summary: Get basic server information and metadata
      operationId: get_root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootGetResponse'
  /health:
    get:
      summary: Get the current MAIL server health
      operationId: get_health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthGetResponse'
components:
  schemas:
    AdminAgentDeleteResponse:
      properties:
        agent:
          $ref: '#/components/schemas/MAILAgent'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - agent
      - metadata
      title: AdminAgentDeleteResponse
      description: 'Corresponds to `DELETE /admin/agent/{agent_address}`.

        Contains a newly-deleted MAIL agent registered on this server.'
    AdminAgentGetResponse:
      properties:
        agent:
          $ref: '#/components/schemas/MAILAgent'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - agent
      - metadata
      title: AdminAgentGetResponse
      description: 'Corresponds to `GET /admin/agents/{agent_address}`.

        Contains a specific MAIL agent registered on this server.'
    AdminAgentPostResponse:
      properties:
        agent:
          $ref: '#/components/schemas/MAILAgent'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - agent
      - metadata
      title: AdminAgentPostResponse
      description: 'Corresponds to `POST /admin/agent`.

        Contains the new MAIL agent registered on this server.'
    AdminAgentsGetResponse:
      properties:
        agents:
          items:
            type: string
          type: array
          title: Agents
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - agents
      - metadata
      title: AdminAgentsGetResponse
      description: 'Corresponds to `GET /admin/agents`.

        Contains the list of agents by local address (name@swarm) registered on this
        MAIL server.'
    AdminDaemonDeleteResponse:
      properties:
        daemon:
          $ref: '#/components/schemas/MAILDaemon'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - daemon
      - metadata
      title: AdminDaemonDeleteResponse
      description: 'Corresponds to `DELETE /admin/daemons/{worker_name}`.

        Contains a newly-deleted MAIL daemon registered on this server.'
    AdminDaemonGetResponse:
      properties:
        daemon:
          $ref: '#/components/schemas/MAILDaemon'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - daemon
      - metadata
      title: AdminDaemonGetResponse
      description: 'Corresponds to `GET /admin/daemons/{worker_name}`.

        Contains a specific MAIL daemon registered on this server.'
    AdminDaemonPostResponse:
      properties:
        daemon:
          $ref: '#/components/schemas/MAILDaemon'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - daemon
      - metadata
      title: AdminDaemonPostResponse
      description: 'Corresponds to `POST /admin/daemons`.

        Contains the new MAIL daemon registered on this server.'
    AdminDaemonsGetResponse:
      properties:
        daemons:
          items:
            type: string
          type: array
          title: Daemons
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - daemons
      - metadata
      title: AdminDaemonsGetResponse
      description: 'Corresponds to `GET /admin/daemons`.

        Contains the list of daemons by worker name registered on this MAIL server.'
    AdminListDeleteResponse:
      properties:
        mail_list:
          $ref: '#/components/schemas/MAILListInBackend'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_list
      - metadata
      title: AdminListDeleteResponse
      description: Corresponds to `DELETE /admin/lists/{list_address}`.
    AdminListGetResponse:
      properties:
        mail_list:
          $ref: '#/components/schemas/MAILListInBackend'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_list
      - metadata
      title: AdminListGetResponse
      description: Corresponds to `GET /admin/lists/{list_address}`.
    AdminListPatchResponse:
      properties:
        mail_list:
          $ref: '#/components/schemas/MAILListInBackend'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_list
      - metadata
      title: AdminListPatchResponse
      description: Corresponds to `PATCH /admin/lists/{list_address}`.
    AdminListPostResponse:
      properties:
        mail_list:
          $ref: '#/components/schemas/MAILListInBackend'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_list
      - metadata
      title: AdminListPostResponse
      description: Corresponds to `POST /admin/lists`.
    AdminListsGetResponse:
      properties:
        lists:
          items:
            $ref: '#/components/schemas/MAILListInBackend'
          type: array
          title: Lists
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - lists
      - metadata
      title: AdminListsGetResponse
      description: Corresponds to `GET /admin/lists`. All lists known to the server.
    AdminSwarmDeleteResponse:
      properties:
        swarm:
          $ref: '#/components/schemas/MAILSwarm'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - swarm
      - metadata
      title: AdminSwarmDeleteResponse
      description: 'Corresponds to `DELETE /admin/swarms/{swarm_name}`.

        Contains info on the newly-deleted MAIL swarm on this server.'
    AdminSwarmPostResponse:
      properties:
        swarm:
          $ref: '#/components/schemas/MAILSwarm'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - swarm
      - metadata
      title: AdminSwarmPostResponse
