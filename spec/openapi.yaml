      title: AuthLogoutPostResponse
      description: 'Corresponds to `POST /auth/logout`.

        Contains a message indicating operation success.'
    AuthPasswordResetRequest:
      properties:
        current_password:
          type: string
          title: Current Password
        new_password:
          type: string
          title: New Password
      type: object
      required:
      - current_password
      - new_password
      title: AuthPasswordResetRequest
      description: 'Corresponds to `POST /auth/password/reset`.

        Contains user''s current password and desired new password.'
    AuthPasswordResetResponse:
      properties:
        status:
          type: string
          const: success
          title: Status
      type: object
      required:
      - status
      title: AuthPasswordResetResponse
      description: 'Corresponds to `POST /auth/password/reset`.

        Contains a message indicating operation success.'
    AuthRefreshPostRequest:
      properties:
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Token
      type: object
      title: AuthRefreshPostRequest
      description: 'Corresponds to `POST /auth/refresh`.

        Body fallback carrying the refresh token for clients that cannot use the

        ``httpOnly`` cookie (e.g. the CLI). Browsers send the token via cookie and

        may omit the body entirely.'
    AuthRefreshPostResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          const: bearer
          title: Token Type
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Token
        expires_in:
          type: integer
          title: Expires In
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - metadata
      title: AuthRefreshPostResponse
      description: 'Corresponds to `POST /auth/refresh`.

        Contains a freshly-minted access token and a rotated refresh token.


        Mirrors `AuthTokenPostResponse`. The previous refresh token is invalidated

        on every successful refresh; ``refresh_token`` carries its replacement (also

        rotated in the ``httpOnly`` cookie for browser clients).'
    AuthTokenPostResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          const: bearer
          title: Token Type
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Token
        expires_in:
          type: integer
          title: Expires In
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - metadata
      title: AuthTokenPostResponse
      description: 'Corresponds to `POST /auth/token`.

        Contains a temporary JWT and associated metadata.


        ``refresh_token`` is populated only for interactive principals (users and

        admins); agents and daemons re-authenticate with their credentials and

        receive ``None``. When present, the server also sets it as an ``httpOnly``

        cookie for browser clients. ``expires_in`` is the access-token lifetime in

        seconds.'
    AuthWhoamiGetResponse:
      properties:
        user_agent:
          $ref: '#/components/schemas/MAILUserAgent'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - user_agent
      - metadata
      title: AuthWhoamiGetResponse
      description: 'Corresponds to `GET /auth/whoami`.

        Contains current user information and metadata.'
    Body_create_auth_token_auth_token_post:
      properties:
        grant_type:
          anyOf:
          - type: string
            pattern: ^password$
          - type: 'null'
          title: Grant Type
        username:
          type: string
          title: Username
        password:
          type: string
          format: password
          title: Password
        scope:
          type: string
          title: Scope
          default: ''
        client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Id
        client_secret:
          anyOf:
          - type: string
          - type: 'null'
          format: password
          title: Client Secret
      type: object
      required:
      - username
      - password
      title: Body_create_auth_token_auth_token_post
    DaemonDeliverLocalRequest:
      properties:
