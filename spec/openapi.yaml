      title: InboxMessageGetResponse
      description: 'Corresponds to `GET /inbox/{message_id}`.

        Contains a specific entry by message ID inside the user-agent''s inbox.'
    ListGetResponse:
      properties:
        mail_list:
          $ref: '#/components/schemas/MAILListInBackend'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_list
      - metadata
      title: ListGetResponse
      description: Corresponds to `GET /lists/{local_address}`.
    ListMemberDeleteResponse:
      properties:
        mail_list:
          $ref: '#/components/schemas/MAILListInBackend'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_list
      - metadata
      title: ListMemberDeleteResponse
      description: 'Corresponds to `POST /lists/{local_address}/unsubscribe`

        and `DELETE /admin/lists/{local_address}/members/{member_address}`.

        The updated list with the member removed (idempotent — removing a

        non-member is a no-op).'
    ListMemberPostRequest:
      properties:
        member_address:
          type: string
          title: Member Address
      type: object
      required:
      - member_address
      title: ListMemberPostRequest
      description: 'Corresponds to ``POST /lists/{local_address}/subscribe``

        and ``POST /admin/lists/{local_address}/members``.


        ``member_address`` is the address being added. For the public

        subscribe path, this must match the authenticated bearer

        (self-subscribe); for the admin add path, any valid MAIL address

        is accepted.'
    ListMemberPostResponse:
      properties:
        mail_list:
          $ref: '#/components/schemas/MAILListInBackend'
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - mail_list
      - metadata
      title: ListMemberPostResponse
      description: 'Corresponds to `POST /lists/{local_address}/subscribe` and

        `POST /admin/lists/{local_address}/members`. The updated list with

        the member appended (idempotent — re-adding an existing member is

        a no-op).'
    ListsGetResponse:
      properties:
        lists:
          items:
            $ref: '#/components/schemas/MAILListInBackend'
          type: array
          title: Lists
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - lists
      - metadata
      title: ListsGetResponse
      description: 'Corresponds to `GET /lists`. Returns lists visible to the caller.

        At v1 every list has ``visibility = "public"``; future versions

        that introduce private lists will filter here.'
    MAILAdmin:
      properties:
        ua_type:
